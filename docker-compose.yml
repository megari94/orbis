
services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     orbis
      POSTGRES_PASSWORD: orbis_secret
      POSTGRES_DB:       orbis_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://orbis:orbis_secret@postgres:5432/orbis_db
      REDIS_URL:    redis://redis:6379
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3000:3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node dist/main"

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL:   http://localhost:3000/api
      VITE_TENANT_ID: tenant-orbis-demo
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: